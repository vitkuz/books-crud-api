name: Kimi PR Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: ${{ github.event.issue.pull_request && (startsWith(github.event.comment.body, '/kimi-review') || startsWith(github.event.comment.body, ' /kimi-review')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      checks: write
    steps:
      - name: React to trigger comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - name: Post job link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/issues/$PR_ISSUE_NUMBER/comments" \
            -f body="▶️ \`/kimi-review\` running — [view job logs]($RUN_URL)"

      - name: Resolve PR head ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          HEAD_REF=$(gh pr view "$PR_ISSUE_NUMBER" \
            --repo "$REPO" \
            --json headRefName \
            --jq .headRefName)
          echo "number=$PR_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}

      - name: Install Kimi CLI
        run: curl -LsSf https://code.kimi.com/install.sh | bash

      - name: Add Kimi CLI to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure Kimi CLI
        run: |
          mkdir -p "$HOME/.kimi"
          cat > "$HOME/.kimi/config.toml" << 'EOF'
          default_model = "moonshot-ai/kimi-k2.6"

          [providers."managed:moonshot-ai"]
          type = "kimi"
          base_url = "https://api.moonshot.ai/v1"
          api_key = "sk-dummy"

          [models."moonshot-ai/kimi-k2.6"]
          provider = "managed:moonshot-ai"
          model = "kimi-k2.6"
          max_context_size = 262144
          capabilities = ["thinking"]
          EOF

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install review script deps
        run: npm install @actions/core
        working-directory: .github/scripts

      - name: Run Kimi reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          KIMI_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: node .github/scripts/kimi-review.mjs
