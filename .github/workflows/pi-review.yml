name: AI Code Review (pi)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        description: PR number to review
      target:
        required: false
        default: anthropic/sonnet
        type: choice
        description: provider/model
        options:
          - anthropic/sonnet
          - anthropic/opus
          - openai/gpt-5.4
          - google/gemini-2.5-pro
          - google/gemini-3.1-pro-preview
          - deepseek/deepseek-chat
          - deepseek/deepseek-reasoner

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get PR diff + metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ inputs.pr_number }} > diff.txt
          gh pr view ${{ inputs.pr_number }} \
            --json title,body \
            --jq '"# \(.title)\n\n\(.body // "_no description_")"' \
            > pr-meta.md
          # Capture the PR's head commit SHA for inline-comment posting.
          head_sha=$(gh pr view ${{ inputs.pr_number }} --json headRefOid --jq '.headRefOid')
          echo "HEAD_SHA=$head_sha" >> "$GITHUB_ENV"

      - name: Build prompt file
        run: |
          {
            cat .github/pi-review/system-prompt.md
            echo
            cat .github/pi-review/instructions.md
            if [ -f CLAUDE.md ]; then
              echo
              echo '## Project conventions (enforce these in the review):'
              cat CLAUDE.md
            fi
            echo
            echo '## Pull request intent (what the author is trying to do):'
            cat pr-meta.md
            echo
            echo 'Unified diff:'
            echo '```diff'
            cat diff.txt
            echo '```'
          } > .pi-review-prompt.tmp.txt

      - name: Run pi review
        env:
          NO_COLOR: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          # ── env vars pi can read via bash to post inline comments ──────────
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:         ${{ inputs.pr_number }}
          REPO:              ${{ github.repository }}
          # HEAD_SHA was set in the previous step via $GITHUB_ENV
        run: |
          target='${{ inputs.target }}'
          provider="${target%%/*}"
          model="${target#*/}"
          npx -y @mariozechner/pi-coding-agent \
            -p @./.pi-review-prompt.tmp.txt \
            --provider "$provider" \
            --model    "$model" \
            --tools    read,grep,find,ls,bash \
            --thinking high \
            --no-session \
            --no-extensions \
            --no-skills \
            | tee review.md

      - name: Assemble comment
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## pi code review — \`${{ inputs.target }}\`"
            echo
            echo "[View CI run]($RUN_URL)"
            echo
            echo '---'
            echo
            cat review.md
          } > comment.md

      - name: Post PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ inputs.pr_number }} --body-file comment.md
