name: Claude PR Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/review') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: React to trigger comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - name: Post job link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/issues/$PR_ISSUE_NUMBER/comments" \
            -f body="▶️ \`/review\` running — [view job logs]($RUN_URL)"

      - name: Resolve PR head ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          HEAD_REF=$(gh pr view "$PR_NUMBER" \
            --repo ${{ github.repository }} \
            --json headRefName \
            --jq .headRefName)
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}
            TRIGGERED BY: @${{ github.event.comment.user.login }} via /review

            Please review this pull request. Focus on:
            - Correctness and potential bugs
            - Code quality, readability, and maintainability
            - Security implications (input validation, auth, secrets, injection)
            - Performance considerations
            - Missing tests for new behavior

            The PR branch is already checked out in the current working directory.

            How to leave feedback:
            - Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`)
              for per-file / per-line issues. Prefer inline comments for anything tied to
              specific code.
            - Use `gh pr comment` for a short top-level summary at the end (one comment).
            - Only post feedback via these GitHub comment mechanisms — do not emit review
              text as plain chat messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
